<div class="relative flex min-h-screen items-center justify-center overflow-hidden px-4 py-8">
  <div class="absolute inset-0 bg-[radial-gradient(circle_at_10%_10%,rgba(229,9,20,0.2),transparent_35%),radial-gradient(circle_at_85%_90%,rgba(37,99,235,0.18),transparent_32%)]"></div>

  <div class="glass-panel relative z-10 w-full max-w-md rounded-2xl p-8 shadow-panel">
    <p class="mb-2 text-xs uppercase tracking-[0.24em] text-fletnix-muted">Welcome Back</p>
    <h1 class="heading-font text-4xl font-semibold text-white" data-testid="login-title">FletNix</h1>
    <p class="mt-2 text-sm text-fletnix-muted">Sign in to discover what to watch tonight.</p>

    <form [formGroup]="form" (ngSubmit)="submit()" class="mt-7 space-y-4">
      <div class="space-y-1.5">
        <label class="text-sm text-fletnix-muted">Email</label>
        <input
          type="email"
          formControlName="email"
          data-testid="login-email"
          class="w-full rounded-xl border border-fletnix-line bg-fletnix-dark/70 px-4 py-3 text-sm text-white outline-none transition focus:border-fletnix-red focus:shadow-glow"
        />
      </div>

      <div class="space-y-1.5">
        <label class="text-sm text-fletnix-muted">Password</label>
        <div class="relative">
          <input
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            data-testid="login-password"
            class="w-full rounded-xl border border-fletnix-line bg-fletnix-dark/70 px-4 py-3 pr-11 text-sm text-white outline-none transition focus:border-fletnix-red focus:shadow-glow"
          />
          <button
            type="button"
            (click)="showPassword = !showPassword"
            class="absolute right-3 top-1/2 -translate-y-1/2 text-fletnix-muted transition hover:text-white"
            [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
          >
            @if (showPassword) {
              <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 3l18 18M10.58 10.58A2 2 0 0012 14a2 2 0 001.41-3.41M9.88 4.24A10.94 10.94 0 0112 5c5 0 9.27 3.11 11 7-1.02 2.13-2.67 3.94-4.66 5.11M6.1 6.1C3.67 7.56 1.73 9.61 1 12c1.73 3.89 6 7 11 7 1.05 0 2.06-.14 3-.4" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            } @else {
              <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke-linecap="round" stroke-linejoin="round" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            }
          </button>
        </div>
      </div>

      @if (success) {
        <p class="rounded-lg border border-emerald-500/35 bg-emerald-500/10 px-3 py-2 text-sm text-emerald-300" data-testid="login-success">{{ success }}</p>
      }
      @if (error) {
        <p class="rounded-lg border border-red-500/35 bg-red-500/10 px-3 py-2 text-sm text-red-300" data-testid="login-error">{{ error }}</p>
      }

      <button
        type="submit"
        [disabled]="loading || form.invalid"
        data-testid="login-submit"
        class="w-full rounded-xl bg-fletnix-red py-3 text-sm font-semibold text-white transition hover:brightness-110 disabled:cursor-not-allowed disabled:opacity-50"
      >
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>

    <p class="mt-5 text-center text-sm text-fletnix-muted">
      New here?
      <a routerLink="/register" class="font-medium text-fletnix-red hover:text-fletnix-redSoft">Create account</a>
    </p>
  </div>
</div>
