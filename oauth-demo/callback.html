<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>OAuth Callback</title>
    <style>
      body { font-family: system-ui; background: #0b0b0f; color: #fff; max-width: 520px; margin: 2rem auto; padding: 1rem; }
      pre { background: #141414; padding: 1rem; overflow: auto; font-size: 12px; }
    </style>
  </head>
  <body>
    <h1>OAuth Callback</h1>
    <pre id="out">Exchanging code...</pre>
    <script>
      const API = "http://localhost:5000/api/v1";
      const CLIENT_ID = "fletnix-demo";
      const CLIENT_SECRET = "demo-secret-change-me";
      const REDIRECT_URI = "http://localhost:5500/callback.html";

      (async () => {
        const params = new URLSearchParams(location.search);
        const code = params.get("code");
        const verifier = sessionStorage.getItem("pkce_verifier");
        const out = document.getElementById("out");

        if (!code || !verifier) {
          out.textContent = "Missing code or PKCE verifier.";
          return;
        }

        const body = new URLSearchParams({
          grant_type: "authorization_code",
          code,
          redirect_uri: REDIRECT_URI,
          client_id: CLIENT_ID,
          client_secret: CLIENT_SECRET,
          code_verifier: verifier,
        });

        const tokenRes = await fetch(`${API}/oauth/token`, {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body,
        });
        const tokens = await tokenRes.json();
        if (!tokenRes.ok) {
          out.textContent = JSON.stringify(tokens, null, 2);
          return;
        }

        const userRes = await fetch(`${API}/oauth/userinfo`, {
          headers: { Authorization: `Bearer ${tokens.access_token}` },
        });
        const user = await userRes.json();
        out.textContent = JSON.stringify({ tokens, user }, null, 2);
        sessionStorage.removeItem("pkce_verifier");
      })();
    </script>
  </body>
</html>
