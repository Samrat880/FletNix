<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Sign in with FletNix — Demo</title>
    <style>
      body { font-family: system-ui; background: #0b0b0f; color: #fff; max-width: 520px; margin: 2rem auto; padding: 1rem; }
      input, button { width: 100%; padding: 0.6rem; margin: 0.4rem 0; border-radius: 8px; border: 1px solid #333; background: #141414; color: #fff; }
      button { background: #e50914; border: none; cursor: pointer; font-weight: 600; }
      pre { background: #141414; padding: 1rem; overflow: auto; font-size: 12px; }
    </style>
  </head>
  <body>
    <h1>FletNix SSO Demo</h1>
    <p>1. Login at <a href="http://localhost:4200/login" style="color:#e50914">FletNix</a></p>
    <p>2. Paste your access token below</p>
    <input id="token" placeholder="JWT access token" />
    <button id="authorize">Sign in with FletNix</button>
    <pre id="out">Waiting...</pre>
    <script src="pkce.js"></script>
    <script src="app.js"></script>
  </body>
</html>
